<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakhi – Community</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>


  <aside class="sidebar">
    <div class="sidebar-logo"><a href="index.html" style="color: white; text-decoration: none;">Sakhi</a></div>
    <nav class="sidebar-nav">
      <a href="chat.html">Health Chat</a>
      <a href="community.html" class="active">Community</a>
      <a href="health-log.html">Health Log</a>
      <a href="dashboard.html">Public Dashboard</a>
      <a href="symptoms.html">Symptoms</a>
    </nav>
  </aside>


  <main class="main">
    <h1 style="font-family:'Sora',sans-serif; font-size:52px; font-weight:800; color:var(--navy); margin-bottom:32px;">
      Community</h1>

    <div class="community-list">


    </div>
  </main>


  <button class="fab-post" onclick="openModal()">Post</button>


  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">New Post</div>
      <div class="modal-sub">All posts are scanned for medical misinformation before publishing.</div>
      <textarea class="modal-textarea" placeholder="Share your experience or ask a question..."></textarea>
      <label class="modal-label">Category</label>
      <div class="category-chips">
        <button class="cat-chip" onclick="selectChip(this)">Pregnancy</button>
        <button class="cat-chip" onclick="selectChip(this)">Periods</button>
        <button class="cat-chip" onclick="selectChip(this)">Mental Health</button>
        <button class="cat-chip" onclick="selectChip(this)">Nutrition</button>
        <button class="cat-chip selected" onclick="selectChip(this)">General</button>
      </div>
      <div class="anon-row">
        <span>👁️‍🗨️</span>
        <span>Posting anonymously</span>
      </div>
      <button class="btn-post-modal" onclick="submitPost()">✈️ &nbsp;Post</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modalOverlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    function selectChip(el) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
    async function toggleTranslation(btn, preText, originalText) {
      const bubble = btn.nextElementSibling;

      if (bubble.style.display !== 'none') {
        bubble.style.display = 'none';
        btn.textContent = 'Translate →';
        return;
      }

      if (bubble.textContent.trim()) {
        bubble.style.display = 'inline-block';
        btn.textContent = 'Hide →';
        return;
      }

      if (preText) {
        bubble.textContent = preText;
        bubble.style.display = 'inline-block';
        btn.textContent = 'Hide →';
        return;
      }

      btn.textContent = 'Translating...';
      try {
        const response = await fetch(
          `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(originalText)}`
        );
        const data = await response.json();
        const translated = data[0].map(item => item[0]).join("").trim();

        bubble.textContent = translated || "Translation unavailable.";
        bubble.style.display = 'inline-block';
        btn.textContent = 'Hide →';
      } catch (err) {
        btn.textContent = 'Translate →';
        console.error("Translation failed:", err);
      }
    }
    function submitPost() {
      const textarea = document.querySelector('.modal-textarea');
      const text = textarea.value.trim();
      if (!text) return;
      const list = document.querySelector('.community-list');
      const card = document.createElement('div');
      card.className = 'community-card';
      card.innerHTML = `
        <div class="community-card-header">
          <span class="community-author">Member</span>
          <span class="category-pill cat-general">General</span>
        </div>
        <div class="community-text">${text}</div>
      `;
      list.prepend(card);
      textarea.value = '';
      closeModal();
    }
  </script>

  <script type="module" src="communityfirebase.js"></script>
</body>

</html>
